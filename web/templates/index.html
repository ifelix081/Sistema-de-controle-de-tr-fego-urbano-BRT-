<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema BRT</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <header id="main-nav-bar">
        <nav aria-label="Barra de navegação principal">
            <img src="{{ url_for('static', filename='logo-onibus.svg') }}" alt="Logotipo do ônibus BRT" class="logo_onibus">
        </nav>
    </header>

    <main>
        <section class="apresentacao">
            <div>
                <h1>Sistema de Controle de Tráfego BRT</h1>
                <p>Consulte rotas e estações do sistema.</p>
            </div>
        </section>

        {% if erro %}
            <section class="mensagem-erro" role="alert">
                <p>{{ erro }}</p>
            </section>
        {% endif %}

        <section class="row">

        <div class="card-relatorios">
            <h2>Rotas</h2>
            <p>Encontre a rota do seu ônibus</p>

            <form action="{{ url_for('consultar_onibus') }}" method="get">
                <label for="linha">Número da linha</label>
                <input
                    id="linha"
                    type="number"
                    name="linha"
                    placeholder="Ex: 123"
                    class="input-linha"
                    required
                >
                <button type="submit">Buscar</button>
            </form>
        </div>

        <div class="card-relatorios">
            <h2>Estações</h2>
            <p>Consultar estação</p>

            <form action="{{ url_for('buscar_estacao') }}" method="get">
                <label for="id_estacao">ID da estação</label>
                <input
                    id="id_estacao"
                    type="number"
                    name="id_estacao"
                    placeholder="Ex: 1"
                    class="input-linha"
                    required
                >
                <button type="submit">Buscar</button>
            </form>
        </div>

    </section>
    </main>

</body>
</html>
